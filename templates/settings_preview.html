{% extends "base.html" %}
{% block content %}
<section class="settings-shell settings-studio-shell advanced-theme-studio preview-settings-page">
    <div class="page-commandbar settings-commandbar compact-studio-bar">
        <div class="page-commandbar-copy">
            <span class="page-eyebrow">Theme Studio</span>
            <strong>Settings Preview</strong>
            <small>This is the settings page layout preview without recursive preview nesting.</small>
        </div>
        <div class="page-commandbar-actions">
            <button class="queue-page-action" type="button">Save</button>
            <button class="queue-page-action subtle" type="button">Reset</button>
        </div>
    </div>
    <div class="theme-builder-grid">
        <aside class="theme-builder-panel">
            <div class="panel-title-row"><div><span class="panel-eyebrow">Scope</span><strong>Where to apply</strong></div><span class="mini-state-chip">Global</span></div>
            <label class="settings-field"><span>Edit scope</span><select><option>App global</option></select></label>
            <label class="studio-toggle"><input type="checkbox" checked><span></span><em>Use same theme everywhere</em></label>
            <div class="theme-kit-strip"><button class="theme-choice-card is-selected" type="button"><span class="theme-choice-orb"></span><strong>Selected Kit</strong></button><button class="theme-choice-card" type="button"><span class="theme-choice-orb"></span><strong>Alt Kit</strong></button></div>
        </aside>
        <main class="theme-builder-panel">
            <div class="panel-title-row"><div><span class="panel-eyebrow">Preview</span><strong>Live Page Render</strong></div><span class="mini-state-chip">Clickable</span></div>
            <div class="palette-panel"><span>Suggested palette</span><div class="palette-grid"><button style="background:var(--theme-accent)"></button><button style="background:var(--theme-accent-2)"></button><button style="background:var(--theme-heading)"></button></div></div>
            <div class="element-variable-list"><div class="variable-group"><strong>Text colors</strong><button class="variable-row"><i style="background:var(--theme-heading)"></i><span>Headings</span><em>Live</em></button><button class="variable-row"><i style="background:var(--theme-body)"></i><span>Body Text</span><em>Live</em></button></div></div>
        </main>
        <aside class="theme-builder-panel">
            <div class="panel-title-row"><div><span class="panel-eyebrow">Element</span><strong>Selected Element</strong></div><span class="mini-state-chip">Button</span></div>
            <label class="settings-field color-editor-field"><span>Color picker</span><div class="color-editor-row"><input type="color" value="#ffffff"><input type="text" value="#ffffff"></div></label>
            <div class="background-panel-inline"><span>Background</span><div class="background-choice-grid compact-background-grid"><button class="background-choice is-selected" type="button">Default Video</button><button class="background-choice" type="button">Image</button></div></div>
        </aside>
    </div>
</section>
{% endblock %}
