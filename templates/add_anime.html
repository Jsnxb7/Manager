{% extends "base.html" %}

{% block content %}
<div class="form-wrapper add-anime-page-wrapper">
    <div class="add-anime-form">
        <h1>Add New Anime</h1>

        <form method="POST" id="add-anime-form" class="clean-add-form validated-add-form" enctype="multipart/form-data" data-entry-type="anime">
            <div class="form-group">
                <label for="title">Anime Title</label>
                <input type="text" id="title" name="title" required data-validate-field placeholder="Enter anime title">
                <p id="titleSafety" class="field-feedback" aria-live="polite"></p>
            </div>

            <div class="form-group">
                <label for="season">Season</label>
                <input type="text" id="season" name="season" required data-validate-field placeholder="Season 1 / S01 / Movie">
            </div>

            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" name="status" required data-validate-field>
                    <option value="Ongoing">Ongoing</option>
                    <option value="Completed">Completed</option>
                    <option value="Not_Aired">Not Aired</option>
                </select>
            </div>

            <div class="form-group">
                <label for="download_link">Download Link</label>
                <input type="url" id="download_link" name="download_link" required placeholder="https://...">
            </div>

            <div class="form-group">
                <label for="episodes">Episodes</label>
                <input type="number" id="episodes" name="episodes" min="1" required placeholder="12">
            </div>

            <div class="form-group anime-metadata-group">
                <label>Anime Headers</label>
                <div id="anime-metadata-picker" class="metadata-picker" aria-live="polite"></div>
                <input type="hidden" id="genres-input" name="genres" value="[]">
                <input type="hidden" id="themes-input" name="themes" value="[]">
                <input type="hidden" id="demographics-input" name="demographics" value="[]">
                <input type="hidden" id="tags-input" name="tags" value="[]">
            </div>

            <div class="form-group thumbnail-upload-group">
                <label for="thumbnail">Thumbnail Image</label>
                <input type="file" id="thumbnail" name="thumbnail" accept="image/*">
                <div class="thumbnail-preview" aria-live="polite">
                    <img id="thumbnail-preview-img" alt="Selected thumbnail preview">
                    <span id="thumbnail-preview-label">No image selected</span>
                </div>
            </div>

            <p id="duplicateFeedback" class="field-feedback" aria-live="polite"></p>

            <button type="submit" class="submit-btn">Add Anime</button>
        </form>
    </div>
</div>

<script>
const METADATA_GROUPS = [
    ["genres", "Genres"],
    ["themes", "Themes"],
    ["demographics", "Demographics"],
    ["tags", "Tags"]
];

let animeMetadataCatalog = {};
const selectedAnimeMetadata = {
    genres: new Set(),
    themes: new Set(),
    demographics: new Set(),
    tags: new Set()
};

function normalizeMetadataName(value) {
    return String(value || "").trim().replace(/\s+/g, " ");
}

function findExistingMetadataGroup(name) {
    const target = normalizeMetadataName(name).toLowerCase();
    if (!target) return null;

    for (const [group] of METADATA_GROUPS) {
        const items = Array.isArray(animeMetadataCatalog[group]) ? animeMetadataCatalog[group] : [];
        if (items.some(item => normalizeMetadataName(item.name || item).toLowerCase() === target)) {
            return group;
        }
    }

    return null;
}

function syncMetadataInputs() {
    METADATA_GROUPS.forEach(([group]) => {
        const input = document.getElementById(`${group}-input`);
        if (input) {
            input.value = JSON.stringify([...selectedAnimeMetadata[group]]);
        }
    });
}

function updateMetadataSelected(group, value, checked) {
    const name = normalizeMetadataName(value);
    if (!name) return;

    if (checked) {
        selectedAnimeMetadata[group].add(name);
    } else {
        selectedAnimeMetadata[group].delete(name);
    }

    syncMetadataInputs();
}

function setMetadataCheckbox(group, value, checked) {
    const checkbox = [...document.querySelectorAll(`input[data-metadata-group="${group}"]`)]
        .find(input => input.value === value);
    if (checkbox) {
        checkbox.checked = checked;
    }
}

function addCustomMetadata(group, input) {
    const name = normalizeMetadataName(input.value);
    if (!name) return;

    const existingGroup = findExistingMetadataGroup(name);
    const finalGroup = existingGroup || group;

    if (existingGroup && existingGroup !== group) {
        alert(`"${name}" already exists under ${existingGroup}. It will be added there instead.`);
    }

    selectedAnimeMetadata[finalGroup].add(name);
    setMetadataCheckbox(finalGroup, name, true);
    input.value = "";
    syncMetadataInputs();
}

function confirmNewMetadataValues() {
    const newValues = [];

    METADATA_GROUPS.forEach(([group, label]) => {
        selectedAnimeMetadata[group].forEach(value => {
            if (!findExistingMetadataGroup(value)) {
                newValues.push(`${label}: ${value}`);
            }
        });
    });

    if (!newValues.length) return true;

    return confirm(
        `These new header values are not in the unique list yet:\n\n${newValues.join("\n")}\n\nAdd them to the anime and update unique_anime_tags.json?`
    );
}

function validateRequiredMetadata() {
    const missing = METADATA_GROUPS
        .filter(([group]) => selectedAnimeMetadata[group].size === 0)
        .map(([, label]) => label);

    if (!missing.length) return true;

    alert(`Select at least one value from each anime header before adding.\n\nMissing: ${missing.join(", ")}`);
    return false;
}

function renderMetadataPicker() {
    const picker = document.getElementById("anime-metadata-picker");
    if (!picker) return;

    picker.innerHTML = "";

    METADATA_GROUPS.forEach(([group, label]) => {
        const details = document.createElement("details");
        details.className = "metadata-section";

        const summary = document.createElement("summary");
        summary.textContent = label;

        const options = document.createElement("div");
        options.className = "metadata-options";

        const items = Array.isArray(animeMetadataCatalog[group]) ? animeMetadataCatalog[group] : [];
        items.forEach(item => {
            const name = item.name || item;
            const count = item.count;
            const option = document.createElement("label");
            option.className = "tag-filter-option";

            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.value = name;
            checkbox.dataset.metadataGroup = group;
            checkbox.addEventListener("change", () => updateMetadataSelected(group, name, checkbox.checked));

            const text = document.createElement("span");
            text.textContent = count ? `${name} (${count})` : name;

            option.append(checkbox, text);
            options.appendChild(option);
        });

        const customRow = document.createElement("div");
        customRow.className = "metadata-custom-row";

        const customInput = document.createElement("input");
        customInput.type = "text";
        customInput.placeholder = `Add ${label.slice(0, -1).toLowerCase()}`;

        const customButton = document.createElement("button");
        customButton.type = "button";
        customButton.className = "submit-btn metadata-add-btn";
        customButton.textContent = "Add";
        customButton.addEventListener("click", () => addCustomMetadata(group, customInput));

        customInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                event.preventDefault();
                addCustomMetadata(group, customInput);
            }
        });

        customRow.append(customInput, customButton);
        details.append(summary, options, customRow);
        picker.appendChild(details);
    });
}

document.addEventListener("DOMContentLoaded", async () => {
    try {
        const response = await fetch("/api/anime-tags");
        animeMetadataCatalog = response.ok ? await response.json() : {};
    } catch (error) {
        console.error("Failed to load anime headers:", error);
        animeMetadataCatalog = {};
    }

    renderMetadataPicker();

    document.getElementById("add-anime-form")?.addEventListener("submit", (event) => {
        syncMetadataInputs();
        if (!validateRequiredMetadata()) {
            event.preventDefault();
            return;
        }
        if (!confirmNewMetadataValues()) {
            event.preventDefault();
        }
    });
});
</script>
{% endblock %}
