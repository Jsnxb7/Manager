{% extends "base.html" %}

{% block content %}
<video class="video-background" autoplay loop muted playsinline>
    <source src="{{ url_for('static', filename='images/stars.mp4') }}" type="video/mp4">
</video>

<link rel="stylesheet" href="{{ url_for('static', filename='css/uni_style.css') }}">

<div class="anime-list">

    <!-- FILTER BUTTONS -->
    <button class="add-anime-button" onclick="resetFilters()">Reset Filters</button>
    <button class="add-anime-button" onclick="filterUnread()">Unread {{ section|capitalize }}</button>
    <button class="add-anime-button" onclick="filterOngoing()">Ongoing {{ section|capitalize }}</button>
    <button class="add-anime-button" onclick="sortBookmarkedFirst()">Sort Bookmarked First</button>
    <!-- Add Item -->
<a href="/{{ section }}/add">
    <button class="add-anime-button">Add New {{ section|capitalize }}</button>
</a>


    <!-- Search -->
    <input
        type="text"
        id="search-bar"
        class="search-bar"
        placeholder="Search {{ section }}..."
        onkeyup="filterItems()"
    >

    <!-- GRID -->
    <div class="anime-grid" id="grid"></div>

    <!-- PAGINATION -->
    <div class="pagination-wrap" id="section-pagination-wrap">
        <div class="pagination-info" id="section-page-info">Showing 0 items</div>
        <div class="pagination-controls">
            <button class="pagination-btn" id="section-prev-btn" onclick="prevPage()">Prev</button>
            <div class="pagination-pages" id="section-page-buttons"></div>
            <button class="pagination-btn" id="section-next-btn" onclick="nextPage()">Next</button>
        </div>
        <label class="page-size-label">
            Per page
            <select id="section-page-size" onchange="changePageSize(this.value)">
                <option value="8">8</option>
                <option value="12" selected>12</option>
                <option value="16">16</option>
                <option value="24">24</option>
            </select>
        </label>
    </div>

</div>

<script>
const SECTION = "{{ section }}";
let allSectionData = [];
let currentSectionData = [];
let currentPage = 1;
let itemsPerPage = 12;

// -----------------------------
// FETCH DATA
// -----------------------------
async function fetchData() {
    const res = await fetch(`/api/${SECTION}`);
    return await res.json();
}

function getTotalPages() {
    return Math.max(1, Math.ceil(currentSectionData.length / itemsPerPage));
}

function setSectionData(items, page = 1) {
    currentSectionData = [...items];
    currentPage = Math.min(Math.max(page, 1), getTotalPages());
    renderPage();
}

function getPageItems() {
    const start = (currentPage - 1) * itemsPerPage;
    return currentSectionData.slice(start, start + itemsPerPage);
}

// -----------------------------
// RENDER PAGE
// -----------------------------
function renderPage() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    const pageItems = getPageItems();

    if (!pageItems.length) {
        grid.innerHTML = `<div class="empty-state">No ${SECTION} items found.</div>`;
    }

    pageItems.forEach(item => {
        const card = document.createElement("div");
        card.className = "anime-card";
        card.id = `${SECTION}-${item.id}`;
        card.dataset.title = item.title.toLowerCase();

        const img = document.createElement("img");
        img.className = "anime-thumbnail";
        img.src = item.thumbnail_url || "/static/placeholder.jpeg";
        img.alt = item.title;

        const info = document.createElement("div");
        info.className = "anime-info";

        const title = document.createElement("div");
        title.className = "anime-title";
        title.textContent = item.title;

        const status = document.createElement("div");
        status.className = "anime-status";
        status.textContent = `Status: ${item.status}`;

        info.append(title, status);

        const actions = document.createElement("div");
        actions.className = "anime-actions";

        const viewBtn = document.createElement("a");
        viewBtn.href = item.link;
        viewBtn.target = "_blank";
        viewBtn.className = "view-button";
        viewBtn.textContent = `View ${SECTION}`;

        const editLinkBtn = document.createElement("button");
        editLinkBtn.className = "mark-watched-button";
        editLinkBtn.textContent = "Edit Link";
        editLinkBtn.onclick = () => updateItemLink(item.id, viewBtn);

        const readBtn = document.createElement("button");
        readBtn.className = "mark-watched-button";
        readBtn.textContent = item.read ? "Read ✅" : "Mark as Read";
        readBtn.onclick = () => toggleRead(item.id, readBtn);

        const bookmarkBtn = document.createElement("button");
        bookmarkBtn.className = "mark-watched-button";
        bookmarkBtn.textContent = item.bookmarked ? "Bookmarked ⭐" : "Bookmark 🔖";
        bookmarkBtn.onclick = () => toggleBookmark(item.id, bookmarkBtn);

        const statusBtn = document.createElement("button");
        statusBtn.className = "mark-watched-button";
        statusBtn.textContent = item.status.toLowerCase() === "ongoing" ? "Mark Completed" : "Mark Ongoing";
        statusBtn.onclick = () => toggleStatus(item.id, status, statusBtn);

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-button";
        deleteBtn.textContent = "Delete";
        deleteBtn.onclick = () => deleteItem(item.id);

        actions.append(viewBtn, editLinkBtn, readBtn, bookmarkBtn, statusBtn, deleteBtn);
        card.append(img, info, actions);
        grid.appendChild(card);
    });

    renderPagination();
}

function renderPagination() {
    const totalPages = getTotalPages();
    const total = currentSectionData.length;
    const start = total ? ((currentPage - 1) * itemsPerPage) + 1 : 0;
    const end = Math.min(currentPage * itemsPerPage, total);

    document.getElementById("section-page-info").textContent =
        total ? `Showing ${start}-${end} of ${total}` : "Showing 0 items";

    document.getElementById("section-prev-btn").disabled = currentPage <= 1;
    document.getElementById("section-next-btn").disabled = currentPage >= totalPages;

    const pageButtons = document.getElementById("section-page-buttons");
    pageButtons.innerHTML = "";

    const windowSize = 5;
    let first = Math.max(1, currentPage - Math.floor(windowSize / 2));
    let last = Math.min(totalPages, first + windowSize - 1);
    first = Math.max(1, last - windowSize + 1);

    for (let page = first; page <= last; page++) {
        const btn = document.createElement("button");
        btn.className = `pagination-page ${page === currentPage ? "active" : ""}`;
        btn.textContent = page;
        btn.onclick = () => goToPage(page);
        pageButtons.appendChild(btn);
    }
}

function goToPage(page) {
    currentPage = Math.min(Math.max(page, 1), getTotalPages());
    renderPage();
    document.querySelector(".anime-list")?.scrollIntoView({ behavior: "smooth", block: "start" });
}

function prevPage() {
    goToPage(currentPage - 1);
}

function nextPage() {
    goToPage(currentPage + 1);
}

function changePageSize(value) {
    itemsPerPage = parseInt(value, 10) || 12;
    goToPage(1);
}

function syncSectionItem(id, changes) {
    allSectionData = allSectionData.map(item => item.id === id ? { ...item, ...changes } : item);
    currentSectionData = currentSectionData.map(item => item.id === id ? { ...item, ...changes } : item);
}

// -----------------------------
// ACTIONS
// -----------------------------
function toggleRead(id, btn) {
    fetch(`/mark_read/${SECTION}/${id}`, { method: "POST" })
        .then(r => r.json())
        .then(d => {
            syncSectionItem(id, { read: d.read });
            btn.textContent = d.read ? "Read ✅" : "Mark as Read";
        });
}

function toggleBookmark(id, btn) {
    fetch(`/bookmark/${SECTION}/${id}`, { method: "POST" })
        .then(r => r.json())
        .then(d => {
            syncSectionItem(id, { bookmarked: d.bookmarked });
            btn.textContent = d.bookmarked ? "Bookmarked ⭐" : "Bookmark 🔖";
        });
}

function toggleStatus(id, statusEl, btn) {
    fetch(`/toggle_status/${SECTION}/${id}`, { method: "POST" })
        .then(r => r.json())
        .then(d => {
            syncSectionItem(id, { status: d.status });
            statusEl.textContent = `Status: ${d.status}`;
            btn.textContent = d.status.toLowerCase() === "ongoing" ? "Mark Completed" : "Mark Ongoing";
        });
}

function deleteItem(id) {
    if (!confirm("Delete this item?")) return;

    fetch(`/delete/${SECTION}/${id}`, { method: "DELETE" })
        .then(() => {
            allSectionData = allSectionData.filter(item => item.id !== id);
            currentSectionData = currentSectionData.filter(item => item.id !== id);
            if (currentPage > getTotalPages()) currentPage = getTotalPages();
            renderPage();
        });
}

async function updateItemLink(id, viewBtn) {
    const link = prompt(`Update ${SECTION} link`, viewBtn.href || "");
    if (link === null) return;

    const trimmed = link.trim();
    if (!trimmed) {
        alert("Link cannot be empty.");
        return;
    }

    try {
        const response = await fetch(`/update_link/${SECTION}/${id}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ link: trimmed })
        });
        const data = await response.json();

        if (data.status === "success") {
            syncSectionItem(id, { link: data.link });
            viewBtn.href = data.link;
        } else {
            alert(data.message || "Failed to update link");
        }
    } catch (error) {
        console.error("Error updating link:", error);
    }
}

// -----------------------------
// FILTERS
// -----------------------------
function filterItems() {
    const q = document.getElementById("search-bar").value.toLowerCase().trim();
    const filtered = allSectionData.filter(item => item.title.toLowerCase().includes(q));
    setSectionData(filtered, 1);
}

function resetFilters() {
    document.getElementById("search-bar").value = "";
    setSectionData(allSectionData, 1);
}

async function sortBookmarkedFirst() {
    const sorted = [...currentSectionData].sort((a, b) => (b.bookmarked === true) - (a.bookmarked === true));
    setSectionData(sorted, 1);
}

function filterUnread() {
    const sorted = [...currentSectionData].sort((a, b) => (a.read === true) - (b.read === true));
    setSectionData(sorted, 1);
}

function filterOngoing() {
    const sorted = [...currentSectionData].sort((a, b) => {
        const aOngoing = String(a.status || "").toLowerCase() === "ongoing";
        const bOngoing = String(b.status || "").toLowerCase() === "ongoing";
        return (bOngoing === true) - (aOngoing === true);
    });
    setSectionData(sorted, 1);
}

// -----------------------------
// LOAD
// -----------------------------
document.addEventListener("DOMContentLoaded", async () => {
    allSectionData = await fetchData();
    setSectionData(allSectionData, 1);
});
</script>
{% endblock %}
