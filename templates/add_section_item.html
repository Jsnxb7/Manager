{% extends "base.html" %}

{% block content %}
<div class="form-wrapper add-anime-page-wrapper">
    <div class="add-anime-form">
        <h1>Add New {{ section }}</h1>

        <form method="POST" id="dynamic-form" class="clean-add-form validated-add-form" enctype="multipart/form-data" data-entry-type="section" data-section="{{ section_slug }}">
            <div class="form-section-title"><span>Basics</span><small>Add title, status, link, and thumbnail for this item.</small></div>
            <div class="form-group">
                <label for="title">{{ section }} Title</label>
                <input type="text" name="title" id="title" required data-validate-field placeholder="Enter title">
                <p id="titleSafety" class="field-feedback" aria-live="polite"></p>
            </div>

            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" name="status" data-validate-field>
                    <option value="Ongoing">Ongoing</option>
                    <option value="Completed">Completed</option>
                    <option value="Hiatus">Hiatus</option>
                </select>
            </div>

            <div class="form-group">
                <label for="link">Link</label>
                <input type="url" id="link" name="link" required data-validate-field placeholder="https://...">
            </div>

            <div class="form-group thumbnail-upload-group">
                <label for="thumbnail">Thumbnail Image</label>
                <input type="file" id="thumbnail" name="thumbnail" accept="image/*">
                <div class="thumbnail-preview" aria-live="polite">
                    <img id="thumbnail-preview-img" alt="Selected thumbnail preview">
                    <span id="thumbnail-preview-label">No image selected</span>
                </div>
            </div>

            <p id="duplicateFeedback" class="field-feedback" aria-live="polite"></p>

            <button type="submit" class="submit-btn">Add {{ section }}</button>
        </form>
    </div>
</div>
{% endblock %}
