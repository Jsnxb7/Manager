{% extends "base.html" %}

{% block content %}

<video class="video-background" autoplay loop muted playsinline>
    <source src="{{ url_for('static', filename='images/stars.mp4') }}" type="video/mp4">
</video>

<div class="form-wrapper">
    <div class="add-anime-form">

        <h1>✨ Add New {{ section }}</h1>

        <form method="POST" id="dynamic-form">

            <div class="form-group">
                <label>{{ section }} Title</label>
                <input type="text" name="title" id="title" required oninput="updatePreview()">
            </div>

            <div class="form-group">
                <label>Status</label>
                <select name="status">
                    <option value="Ongoing">Ongoing</option>
                    <option value="Completed">Completed</option>
                    <option value="Hiatus">Hiatus</option>
                </select>
            </div>

            <div class="form-group">
                <label>Link</label>
                <input type="url" name="link" required>
            </div>

            <!-- Optional dynamic preview -->
            <p id="previewText" class="dir-preview"></p>

            <button type="submit" class="submit-btn">
                ➕ Add {{ section }}
            </button>

        </form>

    </div>
</div>

<style>

/* Base */
body {
    margin: 0;
    font-family: "Comic Sans MS", sans-serif;
    color: white;
}

/* Video background */
.video-background {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* Overlay */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* Center wrapper */
.form-wrapper {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass card */
.add-anime-form {
    width: 380px;
    padding: 28px;
    border-radius: 18px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);

    box-shadow: 0 20px 50px rgba(0,0,0,0.6);

    animation: fadeIn 0.5s ease;
}

/* Title */
.add-anime-form h1 {
    text-align: center;
    margin-bottom: 25px;
}

/* Form groups */
.form-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 15px;
}

label {
    font-size: 14px;
    margin-bottom: 5px;
    color: #ddd;
}

input, select {
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;

    background: rgba(255,255,255,0.15);
    color: white;

    transition: 0.2s;
}

/* Focus */
input:focus, select:focus {
    background: rgba(255,255,255,0.25);
    box-shadow: 0 0 10px rgba(59,130,246,0.6);
}

/* Preview text */
.dir-preview {
    font-size: 12px;
    color: #9ca3af;
    margin-top: 5px;
}

/* Submit */
.submit-btn {
    width: 100%;
    margin-top: 10px;

    padding: 12px;
    border-radius: 10px;
    border: none;

    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: black;
    font-weight: bold;

    cursor: pointer;
    transition: 0.25s;
}

/* Hover */
.submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(34,197,94,0.6);
}

/* Animation */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>

<script>

/* Optional preview logic (generic) */
function updatePreview() {
    const title = document.getElementById("title").value.trim();

    if (title) {
        const safeTitle = title.replace(/\s+/g, "_");
        document.getElementById("previewText").textContent =
            `Folder: ${safeTitle}`;
    } else {
        document.getElementById("previewText").textContent = "";
    }
}

</script>

{% endblock %}
