{% extends "base.html" %}

{% block content %}
<video class="video-background" autoplay loop muted playsinline>
    <source src="{{ url_for('static', filename='images/stars.mp4') }}" type="video/mp4">
</video>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/uni_style.css') }}">
<div class="anime-list">

    <!-- Search -->
    <input type="text" id="search-bar" class="search-bar" placeholder="Search manga..." onkeyup="filterManga()">

    <details class="filter-accordion">
        <summary>Filters</summary>
        <div class="filter-accordion-body">
            <details class="filter-section" open>
                <summary>Quick Filters</summary>
                <div class="filter-actions">
                    <button class="add-anime-button" onclick="resetFilters()">Reset Filters</button>
                    <button class="add-anime-button" onclick="filterUnreadManga()">Unread Manga</button>
                    <button class="add-anime-button" onclick="filterOngoingManga()">Ongoing Manga</button>
                    <button class="add-anime-button" onclick="sortBookmarkedFirst()">Sort Bookmarked First</button>
                </div>
            </details>

            <div id="manga-tag-filters" class="tag-filter-groups"></div>
        </div>
    </details>

    <!-- MANGA GRID -->
    <div class="anime-grid" id="manga-grid"></div>

    <!-- PAGINATION -->
    <div class="pagination-wrap" id="manga-pagination-wrap">
        <div class="pagination-info" id="manga-page-info">Showing 0 items</div>
        <div class="pagination-controls">
            <button class="pagination-btn" id="manga-prev-btn" onclick="prevMangaPage()">Prev</button>
            <div class="pagination-pages" id="manga-page-buttons"></div>
            <button class="pagination-btn" id="manga-next-btn" onclick="nextMangaPage()">Next</button>
        </div>
        <label class="page-size-label">
            Per page
            <select id="manga-page-size" onchange="changeMangaPageSize(this.value)">
                <option value="8">8</option>
                <option value="12" selected>12</option>
                <option value="16">16</option>
                <option value="24">24</option>
            </select>
        </label>
    </div>

</div>

<a href="{{ url_for('add_manga') }}" class="floating-add-anime" aria-label="Add new manga" title="Add New Manga">
    +
</a>

<script>
let allMangaData = [];
let currentMangaData = [];
let currentMangaPage = 1;
let mangaItemsPerPage = 12;
let mangaHeaderCatalog = {};
const activeMangaHeaderFilters = {
    tags: new Set(),
    genres: new Set(),
    themes: new Set(),
    demographics: new Set()
};

function getMangaValues(manga, group) {
    return Array.isArray(manga[group]) ? manga[group] : [];
}

function buildMetadataHover(groups) {
    const wrap = document.createElement("div");
    wrap.className = "card-metadata-hover";

    const trigger = document.createElement("button");
    trigger.type = "button";
    trigger.className = "metadata-hover-trigger";
    trigger.textContent = "Tags";

    const panel = document.createElement("div");
    panel.className = "metadata-hover-panel";

    const visibleGroups = groups.filter(group => group.values.length);
    if (!visibleGroups.length) {
        panel.innerHTML = '<div class="metadata-hover-empty">No headers added yet.</div>';
    } else {
        visibleGroups.forEach(group => {
            const block = document.createElement("div");
            block.className = "metadata-hover-group";

            const title = document.createElement("strong");
            title.textContent = group.label;

            const values = document.createElement("div");
            values.className = "metadata-hover-values";
            values.textContent = group.values.join(", ");

            block.append(title, values);
            panel.appendChild(block);
        });
    }

    wrap.append(trigger, panel);
    return wrap;
}

// -----------------------------
// FETCH MANGA
// -----------------------------
async function fetchMangaData() {
    try {
        const response = await fetch('/api/manga');
        if (!response.ok) throw new Error('Failed to fetch manga data');
        return await response.json();
    } catch (error) {
        console.error("Error fetching manga:", error);
        return [];
    }
}

async function fetchMangaHeaderCatalog() {
    try {
        const response = await fetch('/api/manga-headers');
        if (!response.ok) throw new Error('Failed to fetch manga headers');
        return await response.json();
    } catch (error) {
        console.error("Error fetching manga headers:", error);
        return {};
    }
}

function mangaMatchesSelectedHeaders(manga) {
    return Object.entries(activeMangaHeaderFilters).every(([group, selected]) => {
        if (!selected.size) return true;
        const values = getMangaValues(manga, group).map(value => String(value).toLowerCase());
        return [...selected].some(value => values.includes(value.toLowerCase()));
    });
}

function mangaMatchesSearch(manga, query) {
    if (!query) return true;

    const searchable = [
        manga.title,
        manga.status,
        manga.source_list_name,
        ...(manga.tags || []),
        ...(manga.genres || []),
        ...(manga.themes || []),
        ...(manga.demographics || [])
    ];

    return searchable.some(value => String(value || "").toLowerCase().includes(query));
}

function getFilteredMangaData() {
    const query = document.getElementById("search-bar").value.toLowerCase().trim();
    return allMangaData.filter(manga => mangaMatchesSearch(manga, query) && mangaMatchesSelectedHeaders(manga));
}

function applyMangaFilters(page = 1) {
    setMangaData(getFilteredMangaData(), page);
}

function renderMangaHeaderFilters() {
    const container = document.getElementById("manga-tag-filters");
    if (!container) return;

    const groups = [
        ["genres", "Genres"],
        ["themes", "Themes"],
        ["demographics", "Demographics"],
        ["tags", "Tags"]
    ];

    container.innerHTML = "";

    groups.forEach(([key, label]) => {
        const items = Array.isArray(mangaHeaderCatalog[key]) ? mangaHeaderCatalog[key] : [];
        if (!items.length) return;

        const details = document.createElement("details");
        details.className = "filter-section tag-filter-section";

        const summary = document.createElement("summary");
        summary.textContent = label;

        const options = document.createElement("div");
        options.className = "tag-filter-options";

        items.forEach(item => {
            const name = typeof item === "string" ? item : item.name;
            const count = typeof item === "string" ? null : item.count;
            if (!name) return;

            const option = document.createElement("label");
            option.className = "tag-filter-option";

            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.value = name;
            checkbox.dataset.group = key;
            checkbox.addEventListener("change", () => {
                if (checkbox.checked) {
                    activeMangaHeaderFilters[key].add(name);
                } else {
                    activeMangaHeaderFilters[key].delete(name);
                }
                applyMangaFilters(1);
            });

            const text = document.createElement("span");
            text.textContent = count ? `${name} (${count})` : name;

            option.append(checkbox, text);
            options.appendChild(option);
        });

        details.append(summary, options);
        container.appendChild(details);
    });
}

function getMangaTotalPages() {
    return Math.max(1, Math.ceil(currentMangaData.length / mangaItemsPerPage));
}

function setMangaData(list, page = 1) {
    currentMangaData = [...list];
    currentMangaPage = Math.min(Math.max(page, 1), getMangaTotalPages());
    renderMangaPage();
}

function getMangaPageItems() {
    const start = (currentMangaPage - 1) * mangaItemsPerPage;
    return currentMangaData.slice(start, start + mangaItemsPerPage);
}

// -----------------------------
// RENDER MANGA PAGE
// -----------------------------
function renderMangaPage() {
    const grid = document.getElementById("manga-grid");
    grid.innerHTML = "";

    const pageItems = getMangaPageItems();

    if (!pageItems.length) {
        grid.innerHTML = `<div class="empty-state">No manga found.</div>`;
    }

    pageItems.forEach(manga => {
        const card = document.createElement("div");
        card.className = "anime-card";
        card.id = `manga-${manga.id}`;
        card.setAttribute("data-title", manga.title.toLowerCase());

        const img = document.createElement("img");
        img.className = "anime-thumbnail";
        img.src = manga.thumbnail_url || "/static/placeholder.jpeg";
        img.alt = manga.title;
        img.onerror = function () {
            this.onerror = null;
            this.src = "/static/placeholder.jpeg";
        };

        const info = document.createElement("div");
        info.className = "anime-info";

        const title = document.createElement("div");
        title.className = "anime-title";
        title.textContent = manga.title;

        const status = document.createElement("div");
        status.className = "anime-status";
        status.textContent = `Status: ${manga.status}`;

        const metadataHover = buildMetadataHover([
            { label: "Genres", values: getMangaValues(manga, "genres") },
            { label: "Themes", values: getMangaValues(manga, "themes") },
            { label: "Demographics", values: getMangaValues(manga, "demographics") },
            { label: "Tags", values: getMangaValues(manga, "tags") }
        ]);

        info.append(title, status, metadataHover);

        const actions = document.createElement("div");
        actions.className = "anime-actions";

        const viewBtn = document.createElement("a");
        viewBtn.href = manga.link;
        viewBtn.target = "_blank";
        viewBtn.className = "view-button";
        viewBtn.textContent = "View Manga";

        const editLinkBtn = document.createElement("button");
        editLinkBtn.className = "mark-watched-button";
        editLinkBtn.textContent = "Edit Link";
        editLinkBtn.onclick = () => updateMangaLink(manga.id, viewBtn);

        const readBtn = document.createElement("button");
        readBtn.className = "mark-watched-button";
        readBtn.textContent = manga.read ? "Read ✅" : "Mark as Read";
        readBtn.onclick = () => toggleMangaRead(manga.id, readBtn);

        const bookmarkBtn = document.createElement("button");
        bookmarkBtn.className = "mark-watched-button";
        bookmarkBtn.textContent = manga.bookmarked ? "Bookmarked ⭐" : "Bookmark 🔖";
        bookmarkBtn.onclick = () => toggleMangaBookmark(manga.id, bookmarkBtn);

        const statusBtn = document.createElement("button");
        statusBtn.className = "mark-watched-button";
        statusBtn.textContent = manga.status.toLowerCase() === "ongoing" ? "Mark Completed" : "Mark Ongoing";
        statusBtn.onclick = () => toggleMangaStatus(manga.id, status, statusBtn);

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-button";
        deleteBtn.textContent = "Delete";
        deleteBtn.onclick = () => deleteManga(manga.id);

        actions.append(viewBtn, editLinkBtn, readBtn, bookmarkBtn, statusBtn, deleteBtn);
        card.append(img, info, actions);
        grid.appendChild(card);
    });

    renderMangaPagination();
}

function renderMangaPagination() {
    const totalPages = getMangaTotalPages();
    const total = currentMangaData.length;
    const start = total ? ((currentMangaPage - 1) * mangaItemsPerPage) + 1 : 0;
    const end = Math.min(currentMangaPage * mangaItemsPerPage, total);

    document.getElementById("manga-page-info").textContent =
        total ? `Showing ${start}-${end} of ${total}` : "Showing 0 items";

    document.getElementById("manga-prev-btn").disabled = currentMangaPage <= 1;
    document.getElementById("manga-next-btn").disabled = currentMangaPage >= totalPages;

    const pageButtons = document.getElementById("manga-page-buttons");
    pageButtons.innerHTML = "";

    const windowSize = 5;
    let first = Math.max(1, currentMangaPage - Math.floor(windowSize / 2));
    let last = Math.min(totalPages, first + windowSize - 1);
    first = Math.max(1, last - windowSize + 1);

    for (let page = first; page <= last; page++) {
        const btn = document.createElement("button");
        btn.className = `pagination-page ${page === currentMangaPage ? "active" : ""}`;
        btn.textContent = page;
        btn.onclick = () => goToMangaPage(page);
        pageButtons.appendChild(btn);
    }
}

function goToMangaPage(page) {
    currentMangaPage = Math.min(Math.max(page, 1), getMangaTotalPages());
    renderMangaPage();
    document.querySelector(".anime-list")?.scrollIntoView({ behavior: "smooth", block: "start" });
}

function prevMangaPage() {
    goToMangaPage(currentMangaPage - 1);
}

function nextMangaPage() {
    goToMangaPage(currentMangaPage + 1);
}

function changeMangaPageSize(value) {
    mangaItemsPerPage = parseInt(value, 10) || 12;
    goToMangaPage(1);
}

function syncMangaItem(id, changes) {
    allMangaData = allMangaData.map(item => item.id === id ? { ...item, ...changes } : item);
    currentMangaData = currentMangaData.map(item => item.id === id ? { ...item, ...changes } : item);
}

function toggleMangaStatus(mangaId, statusEl, btn) {
    fetch(`/toggle_manga_status/${mangaId}`, { method: "POST" })
        .then(res => res.json())
        .then(data => {
            syncMangaItem(mangaId, { status: data.status });
            statusEl.textContent = `Status: ${data.status}`;
            btn.textContent = data.status.toLowerCase() === "ongoing" ? "Mark Completed" : "Mark Ongoing";
        });
}

async function sortBookmarkedFirst() {
    const sorted = [...getFilteredMangaData()].sort((a, b) => (b.bookmarked === true) - (a.bookmarked === true));
    setMangaData(sorted, 1);
}

async function resetFilters() {
    document.getElementById("search-bar").value = "";
    Object.values(activeMangaHeaderFilters).forEach(selected => selected.clear());
    document.querySelectorAll('#manga-tag-filters input[type="checkbox"]').forEach(checkbox => {
        checkbox.checked = false;
    });
    setMangaData(allMangaData, 1);
}

async function toggleMangaRead(id, button) {
    try {
        const res = await fetch(`/mark_manga_read/${id}`, { method: "POST" });
        const data = await res.json();

        if (data.status === "success") {
            syncMangaItem(id, { read: data.read });
            button.textContent = data.read ? "Read ✅" : "Mark as Read";
        }
    } catch (err) {
        console.error("Error marking read:", err);
    }
}

async function toggleMangaBookmark(id, button) {
    try {
        const res = await fetch(`/manga_bookmark/${id}`, { method: "POST" });
        const data = await res.json();

        if (data.status === "success") {
            syncMangaItem(id, { bookmarked: data.bookmarked });
            button.textContent = data.bookmarked ? "Bookmarked ⭐" : "Bookmark 🔖";
        }
    } catch (err) {
        console.error("Error bookmarking:", err);
    }
}

async function deleteManga(id) {
    if (!confirm("Delete this manga?")) return;

    try {
        const res = await fetch(`/delete_manga/${id}`, { method: "DELETE" });
        if (res.ok) {
            allMangaData = allMangaData.filter(item => item.id !== id);
            currentMangaData = currentMangaData.filter(item => item.id !== id);
            if (currentMangaPage > getMangaTotalPages()) currentMangaPage = getMangaTotalPages();
            renderMangaPage();
        }
    } catch (err) {
        console.error("Error deleting manga:", err);
    }
}

async function updateMangaLink(id, viewBtn) {
    const link = prompt("Update manga link", viewBtn.href || "");
    if (link === null) return;

    const trimmed = link.trim();
    if (!trimmed) {
        alert("Link cannot be empty.");
        return;
    }

    try {
        const res = await fetch(`/update_manga_link/${id}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ link: trimmed })
        });
        const data = await res.json();

        if (data.status === "success") {
            syncMangaItem(id, { link: data.link });
            viewBtn.href = data.link;
        } else {
            alert(data.message || "Failed to update link");
        }
    } catch (err) {
        console.error("Error updating manga link:", err);
    }
}

function filterManga() {
    applyMangaFilters(1);
}

function filterUnreadManga() {
    const sorted = [...getFilteredMangaData()].sort((a, b) => (a.read === true) - (b.read === true));
    setMangaData(sorted, 1);
}

function filterOngoingManga() {
    const sorted = [...getFilteredMangaData()].sort((a, b) => {
        const aOngoing = String(a.status || "").toLowerCase() === "ongoing";
        const bOngoing = String(b.status || "").toLowerCase() === "ongoing";
        return (bOngoing === true) - (aOngoing === true);
    });
    setMangaData(sorted, 1);
}

// -----------------------------
// PAGE LOAD
// -----------------------------
document.addEventListener("DOMContentLoaded", async () => {
    [allMangaData, mangaHeaderCatalog] = await Promise.all([
        fetchMangaData(),
        fetchMangaHeaderCatalog()
    ]);
    renderMangaHeaderFilters();
    setMangaData(allMangaData, 1);
});
</script>
{% endblock %}
