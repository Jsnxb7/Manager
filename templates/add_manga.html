{% extends "base.html" %}

{% block content %}
<div class="add-anime-form">
    <h1>Add New Manga</h1>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #333;
        }

        /* Video Background */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1;
        }
    </style>

    <!-- Background Video -->
    <video class="video-background" autoplay loop muted>
        <source src="{{ url_for('static', filename='images/stars.mp4') }}" type="video/mp4">
    </video>

    <!-- FORM -->
      <form method="POST" id="add-manga-form">

        <label for="title">Manga Title:</label>
        <input type="text" id="title" name="title" required>

        <label for="chapters">Total Chapters:</label>
        <input type="number" id="chapters" name="chapters" min="1" required>

        <label for="status">Status:</label>
        <select id="status" name="status" required>
            <option value="Ongoing">Ongoing</option>
            <option value="Completed">Completed</option>
            <option value="Hiatus">Hiatus</option>
        </select>

        <label for="link">Download/Read Link:</label>
        <input type="url" id="link" name="link" required>

        <button type="submit">Add Manga</button>
    </form>
</div>

<script>
    const BASE_PATH = "C:/Users/shour/Documents/Manga";  // Matching Anime version

    function updateDirectory() {
        const title = document.getElementById("title").value.trim();
        const chapters = document.getElementById("chapters").value.trim();

        if (title && chapters) {
            document
                .getElementById("add-manga-form")
                .setAttribute("data-directory", `${BASE_PATH}/${title}/Chapters_${chapters}`);
        }
    }
</script>

{% endblock %}
