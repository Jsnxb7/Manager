{% extends "base.html" %}

{% block content %}

<video class="video-background" autoplay loop muted playsinline>
    <source src="{{ url_for('static', filename='images/stars.mp4') }}" type="video/mp4">
</video>

<div class="form-wrapper">
    <div class="add-anime-form">

        <h1>📚 Add New Manga</h1>

        <form method="POST" id="add-manga-form">

            <div class="form-group">
                <label>Manga Title</label>
                <input type="text" id="title" name="title" required oninput="updateDirectory()">
            </div>

            <div class="form-group">
                <label>Total Chapters</label>
                <input type="number" id="chapters" name="chapters" min="1" required oninput="updateDirectory()">
            </div>

            <div class="form-group">
                <label>Status</label>
                <select id="status" name="status" required>
                    <option value="Ongoing">Ongoing</option>
                    <option value="Completed">Completed</option>
                    <option value="Hiatus">Hiatus</option>
                </select>
            </div>

            <div class="form-group">
                <label>Read / Download Link</label>
                <input type="url" id="link" name="link" required>
            </div>

            <!-- Optional preview -->
            <p id="dirPreview" class="dir-preview"></p>

            <button type="submit" class="submit-btn">➕ Add Manga</button>

        </form>

    </div>
</div>

<style>

/* Base */
body {
    margin: 0;
    font-family: "Comic Sans MS", sans-serif;
    color: white;
}

/* Background video */
.video-background {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* Dark overlay */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* Center wrapper */
.form-wrapper {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass card */
.add-anime-form {
    width: 400px;
    padding: 30px;
    border-radius: 18px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);

    box-shadow: 0 20px 50px rgba(0,0,0,0.6);

    animation: fadeIn 0.5s ease;
}

/* Title */
.add-anime-form h1 {
    text-align: center;
    margin-bottom: 25px;
}

/* Form groups */
.form-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 15px;
}

label {
    font-size: 14px;
    margin-bottom: 5px;
    color: #ddd;
}

input, select {
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;

    background: rgba(255,255,255,0.15);
    color: white;

    transition: 0.2s;
}

/* Focus effect */
input:focus, select:focus {
    background: rgba(255,255,255,0.25);
    box-shadow: 0 0 10px rgba(59,130,246,0.6);
}

/* Directory preview */
.dir-preview {
    font-size: 12px;
    color: #9ca3af;
    margin-top: 5px;
    word-break: break-all;
}

/* Submit button */
.submit-btn {
    width: 100%;
    margin-top: 10px;

    padding: 12px;
    border-radius: 10px;
    border: none;

    background: linear-gradient(135deg, #7c3aed, #5b21b6);
    color: white;
    font-weight: bold;

    cursor: pointer;
    transition: 0.25s;
}

/* Hover */
.submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(124,58,237,0.6);
}

/* Animation */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>

<script>
const BASE_PATH = "C:/Users/shour/Documents/Manga";

function updateDirectory() {
    const title = document.getElementById("title").value.trim();
    const chapters = document.getElementById("chapters").value.trim();

    if (title && chapters) {
        const path = `${BASE_PATH}/${title}/Chapters_${chapters}`;

        document.getElementById("add-manga-form")
            .setAttribute("data-directory", path);

        // 🔥 Show preview
        document.getElementById("dirPreview").textContent = path;
    }
}
</script>

{% endblock %}
