<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Content Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="hub-page">
<div class="container">
    {% for section in sections %}
        <a href="/{{ section|lower|replace(' ', '_') }}">
            <button>{{ section }}</button>
        </a>
    {% endfor %}

    <!-- Add button -->
    <button class="add-btn" onclick="addNew()">+</button>
</div>

<form id="addForm" method="POST" action="/add-section" class="hidden-form">
    <input type="hidden" name="name" id="sectionName">
</form>

<script>
    function addNew() {
        const name = prompt("Enter new section name:");
        if (!name) return;

        document.getElementById("sectionName").value = name;
        document.getElementById("addForm").submit();
    }
</script>

</body>
</html>
