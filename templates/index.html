{% extends "base.html" %}

{% block content %}
<video class="video-background" autoplay loop muted playsinline>
    <source src="{{ url_for('static', filename='images/stars.mp4') }}" type="video/mp4">
    Your browser does not support the video tag.
</video>

<section class="continue-watching-shell" id="continue-watching-shell" hidden>
    <div class="continue-watching-header">
        <h2>Continue Watching</h2>
    </div>
    <div class="continue-watching-row" id="continue-watching-row"></div>
</section>

<div class="anime-list">
    <input type="text" id="search-bar" class="search-bar" placeholder="Search anime..." onkeyup="filterAnime()">

    <details class="filter-accordion">
        <summary>Filters</summary>
        <div class="filter-accordion-body">
            <details class="filter-section" open>
                <summary>Quick Filters</summary>
                <div class="filter-actions">
                    <button class="add-anime-button" onclick="resetFilters()">Reset Filters</button>
                    <button class="add-anime-button" onclick="filterUnwatchedAnime()">Unwatched Anime</button>
                    <button class="add-anime-button" onclick="filterOngoingAnime()">Ongoing Anime</button>
                    <button class="add-anime-button" onclick="sortBookmarkedFirst()">Sort Bookmarked First</button>
                </div>
            </details>

            <div id="anime-tag-filters" class="tag-filter-groups"></div>
        </div>
    </details>

    <div class="anime-grid" id="anime-grid"></div>

    <div class="pagination-wrap" id="anime-pagination-wrap">
        <div class="pagination-info" id="anime-page-info">Showing 0 anime</div>
        <div class="pagination-controls">
            <button class="pagination-btn" id="anime-prev-btn" onclick="prevPage()">Prev</button>
            <div class="pagination-pages" id="anime-page-buttons"></div>
            <button class="pagination-btn" id="anime-next-btn" onclick="nextPage()">Next</button>
        </div>
        <label class="page-size-label">
            Per page
            <select id="anime-page-size" onchange="changePageSize(this.value)">
                <option value="8">8</option>
                <option value="12" selected>12</option>
                <option value="16">16</option>
                <option value="24">24</option>
            </select>
        </label>
    </div>
</div>

<a href="{{ url_for('add_anime') }}" class="floating-add-anime" aria-label="Add new anime" title="Add New Anime">
    +
</a>

<script>
let allAnimeData = [];
let currentAnimeData = [];
let currentPage = 1;
let itemsPerPage = 12;
let animeTagCatalog = {};
const activeTagFilters = {
    tags: new Set(),
    genres: new Set(),
    themes: new Set(),
    demographics: new Set()
};

async function fetchAnimeData() {
    try {
        const response = await fetch('/api/anime');
        if (!response.ok) throw new Error('Failed to fetch anime data');
        return await response.json();
    } catch (error) {
        console.error('Error fetching anime data:', error);
        return [];
    }
}

async function fetchAnimeTagCatalog() {
    try {
        const response = await fetch('/api/anime-tags');
        if (!response.ok) throw new Error('Failed to fetch anime tags');
        return await response.json();
    } catch (error) {
        console.error('Error fetching anime tag filters:', error);
        return {};
    }
}

async function fetchContinueWatching() {
    try {
        const response = await fetch('/api/tracking/continue-watching');
        if (!response.ok) throw new Error('Failed to fetch continue watching');
        const data = await response.json();
        return Array.isArray(data.items) ? data.items : [];
    } catch (error) {
        console.error('Error fetching continue watching:', error);
        return [];
    }
}

function formatWatchTime(seconds) {
    const total = Math.max(0, Math.floor(Number(seconds) || 0));
    const hours = Math.floor(total / 3600);
    const minutes = Math.floor((total % 3600) / 60);
    const secs = total % 60;
    if (hours) {
        return `${hours}:${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }
    return `${minutes}:${String(secs).padStart(2, '0')}`;
}

async function discardContinueWatching(animeId, episodeNumber) {
    const response = await fetch('/api/tracking/discard', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ anime_id: animeId, episode_number: episodeNumber })
    });
    if (!response.ok) throw new Error('Failed to discard continue watching item');
    renderContinueWatching((await response.json()).continue_watching || []);
}

function renderContinueWatching(items) {
    const shell = document.getElementById('continue-watching-shell');
    const row = document.getElementById('continue-watching-row');
    if (!shell || !row) return;

    row.innerHTML = '';
    shell.hidden = !items.length;
    if (!items.length) return;

    items.forEach(item => {
        const card = document.createElement('article');
        card.className = 'continue-card';

        const identity = document.createElement('div');
        identity.className = 'continue-card-identity';

        const poster = document.createElement('img');
        poster.className = 'continue-card-poster';
        poster.src = item.anime_thumbnail || '/static/placeholder.jpeg';
        poster.alt = item.anime_title || 'Anime thumbnail';
        poster.onerror = function () {
            this.onerror = null;
            this.src = '/static/placeholder.jpeg';
        };

        const titleBlock = document.createElement('div');
        titleBlock.className = 'continue-card-title-block';

        const title = document.createElement('h3');
        title.textContent = item.anime_title || 'Untitled';

        const status = document.createElement('span');
        status.className = 'continue-card-status';
        status.textContent = item.watch_status || 'Watching';

        titleBlock.append(title, status);
        identity.append(poster, titleBlock);

        const preview = document.createElement('div');
        preview.className = 'continue-card-preview';

        if (item.episode_video_url) {
            const video = document.createElement('video');
            video.className = 'continue-preview-media';
            video.muted = true;
            video.loop = true;
            video.playsInline = true;
            video.preload = 'metadata';

            const source = document.createElement('source');
            source.src = item.episode_video_url;
            source.type = 'video/mp4';
            video.appendChild(source);

            card.addEventListener('mouseenter', () => video.play().catch(() => {}));
            card.addEventListener('mouseleave', () => {
                video.pause();
                try { video.currentTime = 0.2; } catch (error) {}
            });
            preview.appendChild(video);
        } else {
            const fallback = document.createElement('img');
            fallback.className = 'continue-preview-media';
            fallback.src = item.anime_thumbnail || '/static/placeholder.jpeg';
            fallback.alt = '';
            fallback.onerror = function () {
                this.onerror = null;
                this.src = '/static/placeholder.jpeg';
            };
            preview.appendChild(fallback);
        }

        const previewShade = document.createElement('div');
        previewShade.className = 'continue-preview-shade';

        const previewText = document.createElement('div');
        previewText.className = 'continue-preview-text';

        const previewKicker = document.createElement('span');
        previewKicker.className = 'continue-preview-kicker';
        previewKicker.textContent = 'Currently on';

        const previewEpisode = document.createElement('strong');
        previewEpisode.textContent = item.episode_number ? `Episode ${item.episode_number}` : 'Current Episode';

        const previewName = document.createElement('span');
        previewName.textContent = item.episode_title || item.anime_title || '';

        previewText.append(previewKicker, previewEpisode, previewName);
        preview.append(previewShade, previewText);

        const overlay = document.createElement('div');
        overlay.className = 'continue-card-overlay';

        const continueLink = document.createElement('a');
        continueLink.className = 'continue-play-button';
        continueLink.href = item.continue_url;
        continueLink.textContent = 'Continue';

        const startOverLink = document.createElement('a');
        startOverLink.className = 'continue-start-button';
        startOverLink.href = item.start_over_url;
        startOverLink.textContent = 'Start Over';

        const discardButton = document.createElement('button');
        discardButton.type = 'button';
        discardButton.className = 'continue-discard-button';
        discardButton.textContent = 'Discard';
        discardButton.onclick = async () => {
            try {
                await discardContinueWatching(item.anime_id, item.episode_number);
            } catch (error) {
                alert(error.message);
            }
        };

        const actionGroup = document.createElement('div');
        actionGroup.className = 'continue-overlay-actions';
        actionGroup.append(continueLink, startOverLink);

        overlay.append(preview, actionGroup, discardButton);

        const info = document.createElement('div');
        info.className = 'continue-card-info';

        const meta = document.createElement('p');
        meta.textContent = `Episode ${item.episode_number || '?'} - ${formatWatchTime(item.current_time)} / ${formatWatchTime(item.total_duration)}`;

        const progressTrack = document.createElement('div');
        progressTrack.className = 'continue-progress-track';

        const progressBar = document.createElement('span');
        progressBar.className = 'continue-progress-bar';
        progressBar.style.width = `${Math.min(100, Math.max(0, Number(item.progress_percentage) || 0))}%`;

        progressTrack.appendChild(progressBar);
        info.append(meta, progressTrack);
        card.append(identity, overlay, info);
        row.appendChild(card);
    });
}

function getAnimeValues(anime, group) {
    return Array.isArray(anime[group]) ? anime[group] : [];
}

function buildMetadataHover(groups) {
    const wrap = document.createElement('div');
    wrap.className = 'card-metadata-hover';

    const trigger = document.createElement('button');
    trigger.type = 'button';
    trigger.className = 'metadata-hover-trigger';
    trigger.textContent = 'Tags';

    const panel = document.createElement('div');
    panel.className = 'metadata-hover-panel';

    const visibleGroups = groups.filter(group => group.values.length);
    if (!visibleGroups.length) {
        panel.innerHTML = '<div class="metadata-hover-empty">No headers added yet.</div>';
    } else {
        visibleGroups.forEach(group => {
            const block = document.createElement('div');
            block.className = 'metadata-hover-group';

            const title = document.createElement('strong');
            title.textContent = group.label;

            const values = document.createElement('div');
            values.className = 'metadata-hover-values';
            values.textContent = group.values.join(', ');

            block.append(title, values);
            panel.appendChild(block);
        });
    }

    wrap.append(trigger, panel);
    return wrap;
}

function animeMatchesSelectedTags(anime) {
    return Object.entries(activeTagFilters).every(([group, selected]) => {
        if (!selected.size) return true;
        const values = getAnimeValues(anime, group).map(value => String(value).toLowerCase());
        return [...selected].some(value => values.includes(value.toLowerCase()));
    });
}

function animeMatchesSearch(anime, query) {
    if (!query) return true;

    const searchable = [
        anime.title,
        anime.season,
        anime.status,
        ...(anime.tags || []),
        ...(anime.genres || []),
        ...(anime.themes || []),
        ...(anime.demographics || [])
    ];

    return searchable.some(value => String(value || '').toLowerCase().includes(query));
}

function getFilteredAnimeData() {
    const query = document.getElementById('search-bar').value.toLowerCase().trim();
    return allAnimeData.filter(anime => animeMatchesSearch(anime, query) && animeMatchesSelectedTags(anime));
}

function applyAnimeFilters(page = 1) {
    setAnimeData(getFilteredAnimeData(), page);
}

function renderAnimeTagFilters() {
    const container = document.getElementById('anime-tag-filters');
    if (!container) return;

    const groups = [
        ['genres', 'Genres'],
        ['themes', 'Themes'],
        ['demographics', 'Demographics'],
        ['tags', 'Tags']
    ];

    container.innerHTML = '';

    groups.forEach(([key, label]) => {
        const items = Array.isArray(animeTagCatalog[key]) ? animeTagCatalog[key] : [];
        if (!items.length) return;

        const details = document.createElement('details');
        details.className = 'filter-section tag-filter-section';

        const summary = document.createElement('summary');
        summary.textContent = label;

        const options = document.createElement('div');
        options.className = 'tag-filter-options';

        items.forEach(item => {
            const name = typeof item === 'string' ? item : item.name;
            const count = typeof item === 'string' ? null : item.count;
            if (!name) return;

            const option = document.createElement('label');
            option.className = 'tag-filter-option';

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.value = name;
            checkbox.dataset.group = key;
            checkbox.addEventListener('change', () => {
                if (checkbox.checked) {
                    activeTagFilters[key].add(name);
                } else {
                    activeTagFilters[key].delete(name);
                }
                applyAnimeFilters(1);
            });

            const text = document.createElement('span');
            text.textContent = count ? `${name} (${count})` : name;

            option.append(checkbox, text);
            options.appendChild(option);
        });

        details.append(summary, options);
        container.appendChild(details);
    });
}

function getTotalPages() {
    return Math.max(1, Math.ceil(currentAnimeData.length / itemsPerPage));
}

function setAnimeData(items, page = 1) {
    currentAnimeData = [...items];
    currentPage = Math.min(Math.max(page, 1), getTotalPages());
    renderAnimePage();
}

function getPageItems() {
    const start = (currentPage - 1) * itemsPerPage;
    return currentAnimeData.slice(start, start + itemsPerPage);
}

function renderAnimePage() {
    const animeGrid = document.getElementById('anime-grid');
    animeGrid.innerHTML = '';

    const pageItems = getPageItems();

    if (!pageItems.length) {
        animeGrid.innerHTML = `<div class="empty-state">No anime found.</div>`;
    }

    pageItems.forEach(anime => {
        const animeCard = document.createElement('div');
        animeCard.className = 'anime-card';
        animeCard.id = `anime-${anime.id}`;
        animeCard.dataset.title = (anime.title || '').toLowerCase();

        const animeThumbnail = document.createElement('img');
        animeThumbnail.className = 'anime-thumbnail';
        animeThumbnail.src = anime.thumbnail_url || '/static/placeholder.jpeg';
        animeThumbnail.alt = anime.title || 'Anime thumbnail';
        animeThumbnail.onerror = function () {
            this.onerror = null;
            this.src = '/static/placeholder.jpeg';
        };

        const animeInfo = document.createElement('div');
        animeInfo.className = 'anime-info';

        const animeTitle = document.createElement('div');
        animeTitle.className = 'anime-title';
        animeTitle.textContent = anime.title || 'Untitled';

        const animeSeason = document.createElement('div');
        animeSeason.className = 'anime-season';
        animeSeason.textContent = `Season: ${anime.season || 'N/A'}`;

        const animeStatus = document.createElement('div');
        animeStatus.className = 'anime-status';
        animeStatus.textContent = anime.status || 'Ongoing';

        const metadataHover = buildMetadataHover([
            { label: 'Genres', values: getAnimeValues(anime, 'genres') },
            { label: 'Themes', values: getAnimeValues(anime, 'themes') },
            { label: 'Demographics', values: getAnimeValues(anime, 'demographics') },
            { label: 'Tags', values: getAnimeValues(anime, 'tags') }
        ]);

        const animeActions = document.createElement('div');
        animeActions.className = 'anime-actions';

        const viewButton = document.createElement('a');
        viewButton.className = 'view-button';
        viewButton.href = `/anime/${anime.id}`;
        viewButton.textContent = 'View Anime';

        const markWatchedButton = document.createElement('button');
        markWatchedButton.className = 'mark-watched-button';
        markWatchedButton.textContent = anime.watched ? 'Watched ✅' : 'Mark as Watched';
        markWatchedButton.onclick = () => toggleAnimeWatched(anime.id, markWatchedButton);

        const bookmarkButton = document.createElement('button');
        bookmarkButton.className = 'mark-watched-button';
        bookmarkButton.textContent = anime.bookmarked ? 'Bookmarked ⭐' : 'Bookmark 🔖';
        bookmarkButton.onclick = () => toggleBookmark(anime.id, bookmarkButton);

        const deleteButton = document.createElement('button');
        deleteButton.className = 'delete-button';
        deleteButton.textContent = 'Delete';
        deleteButton.onclick = () => deleteAnime(anime.id);

        const addToQueueButton = document.createElement('button');
        addToQueueButton.className = 'view-button';
        addToQueueButton.textContent = '➕ Add to Queue';
        addToQueueButton.onclick = async () => {
            try {
                await addToQueue(anime.title, anime.id);
            } catch (err) {
                alert('Failed to add to queue: ' + err.message);
            }
        };

        animeActions.append(viewButton, markWatchedButton, bookmarkButton, deleteButton, addToQueueButton);
        animeInfo.append(animeTitle, animeSeason, animeStatus, metadataHover, animeActions);
        animeCard.append(animeThumbnail, animeInfo);
        animeGrid.appendChild(animeCard);
    });

    renderPagination();
}

function renderPagination() {
    const totalPages = getTotalPages();
    const total = currentAnimeData.length;
    const start = total ? ((currentPage - 1) * itemsPerPage) + 1 : 0;
    const end = Math.min(currentPage * itemsPerPage, total);

    document.getElementById('anime-page-info').textContent =
        total ? `Showing ${start}-${end} of ${total}` : 'Showing 0 anime';

    document.getElementById('anime-prev-btn').disabled = currentPage <= 1;
    document.getElementById('anime-next-btn').disabled = currentPage >= totalPages;

    const pageButtons = document.getElementById('anime-page-buttons');
    pageButtons.innerHTML = '';

    const windowSize = 5;
    let first = Math.max(1, currentPage - Math.floor(windowSize / 2));
    let last = Math.min(totalPages, first + windowSize - 1);
    first = Math.max(1, last - windowSize + 1);

    for (let page = first; page <= last; page++) {
        const btn = document.createElement('button');
        btn.className = `pagination-page ${page === currentPage ? 'active' : ''}`;
        btn.textContent = page;
        btn.onclick = () => goToPage(page);
        pageButtons.appendChild(btn);
    }
}

function goToPage(page) {
    currentPage = Math.min(Math.max(page, 1), getTotalPages());
    renderAnimePage();
    document.querySelector('.anime-list')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function prevPage() {
    goToPage(currentPage - 1);
}

function nextPage() {
    goToPage(currentPage + 1);
}

function changePageSize(value) {
    itemsPerPage = parseInt(value, 10) || 12;
    goToPage(1);
}

function syncAnimeItem(id, changes) {
    allAnimeData = allAnimeData.map(anime => anime.id === id ? { ...anime, ...changes } : anime);
    currentAnimeData = currentAnimeData.map(anime => anime.id === id ? { ...anime, ...changes } : anime);
}

function filterAnime() {
    applyAnimeFilters(1);
}

function resetFilters() {
    document.getElementById('search-bar').value = '';
    Object.values(activeTagFilters).forEach(selected => selected.clear());
    document.querySelectorAll('#anime-tag-filters input[type="checkbox"]').forEach(checkbox => {
        checkbox.checked = false;
    });
    setAnimeData(allAnimeData, 1);
}

function filterOngoingAnime() {
    const sorted = [...getFilteredAnimeData()].sort((a, b) => {
        const aOngoing = (a.status || '').toLowerCase() === 'ongoing';
        const bOngoing = (b.status || '').toLowerCase() === 'ongoing';
        return bOngoing - aOngoing;
    });
    setAnimeData(sorted, 1);
}

function filterUnwatchedAnime() {
    const sorted = [...getFilteredAnimeData()].sort((a, b) => (a.watched === true) - (b.watched === true));
    setAnimeData(sorted, 1);
}

function sortBookmarkedFirst() {
    const sorted = [...getFilteredAnimeData()].sort((a, b) => (b.bookmarked === true) - (a.bookmarked === true));
    setAnimeData(sorted, 1);
}

async function toggleBookmark(animeId, button) {
    try {
        const response = await fetch(`/bookmark/${animeId}`, { method: 'POST' });
        if (!response.ok) throw new Error('Failed to toggle bookmark');

        const data = await response.json();
        if (data.status === 'success') {
            syncAnimeItem(animeId, { bookmarked: data.bookmarked });
            button.textContent = data.bookmarked ? 'Bookmarked ⭐' : 'Bookmark 🔖';
        }
    } catch (error) {
        console.error('Error toggling bookmark:', error);
    }
}

async function toggleAnimeWatched(animeId, button) {
    try {
        const response = await fetch(`/mark_anime_watched/${animeId}`, { method: 'POST' });
        if (!response.ok) throw new Error('Failed to toggle watched status');

        const data = await response.json();
        if (data.status === 'success') {
            const watched = button.textContent === 'Mark as Watched';
            syncAnimeItem(animeId, { watched });
            button.textContent = watched ? 'Watched ✅' : 'Mark as Watched';
        }
    } catch (error) {
        console.error('Error toggling watched status:', error);
    }
}

async function addToQueue(animeTitle, animeId) {
    const response = await fetch('/add_video', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: animeTitle, id: animeId })
    });

    const data = await response.json();
    if (data.status === 'success') {
        location.reload();
    } else {
        alert('Error: ' + data.message);
    }
}

async function deleteAnime(animeId) {
    if (!confirm('Are you sure you want to delete this anime?')) return;

    try {
        const response = await fetch(`/delete_anime/${animeId}`, { method: 'DELETE' });
        if (!response.ok) throw new Error('Delete failed');

        allAnimeData = allAnimeData.filter(anime => anime.id !== animeId);
        currentAnimeData = currentAnimeData.filter(anime => anime.id !== animeId);
        if (currentPage > getTotalPages()) currentPage = getTotalPages();
        renderAnimePage();
    } catch (error) {
        console.error('Error deleting anime:', error);
        alert('An error occurred while deleting the anime.');
    }
}

document.addEventListener('DOMContentLoaded', async () => {
    const [animeItems, tagCatalog, continueItems] = await Promise.all([
        fetchAnimeData(),
        fetchAnimeTagCatalog(),
        fetchContinueWatching()
    ]);
    allAnimeData = animeItems;
    animeTagCatalog = tagCatalog;
    renderContinueWatching(continueItems);
    renderAnimeTagFilters();
    setAnimeData(allAnimeData, 1);
});
</script>
{% endblock %}
