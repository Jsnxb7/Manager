{% extends "base.html" %}

{% block content %}
<video class="video-background" autoplay loop muted>
    <source src="static/images/stars.mp4" type="video/mp4">
    Your browser does not support the video tag.
</video>
    <div class="anime-list">
        <!-- "Show Ongoing Anime" Button -->
<button class="add-anime-button" onclick="filterOngoingAnime()">Show Ongoing Anime</button>

<script>
    function filterOngoingAnime() {
        const animeGrid = document.getElementById('anime-grid');
        const animeCards = Array.from(animeGrid.children);

        // Separate ongoing and other anime
        const ongoingAnime = animeCards.filter(card => {
            return card.querySelector('.anime-status').textContent.trim().toLowerCase() === 'ongoing';
        });

        const otherAnime = animeCards.filter(card => !ongoingAnime.includes(card));

        // Clear grid and append sorted elements
        animeGrid.innerHTML = '';
        ongoingAnime.forEach(card => animeGrid.appendChild(card));
        otherAnime.forEach(card => animeGrid.appendChild(card));
    }
</script>

        <a href="{{ url_for('add_anime') }}" style="color: #ffffff;"><button class="add-anime-button">Add New Anime</button></a>

        <!-- Search Bar -->
        <input type="text" id="search-bar" class="search-bar" placeholder="Search anime..." onkeyup="filterAnime()">

        <!-- Anime Grid Container -->
        <div class="anime-grid" id="anime-grid">
            <!-- Anime cards will be dynamically inserted here -->
        </div>
    </div>
    

    <style>
       body {
    font-family: "Comic Sans MS", sans-serif;
    margin: 0;
    padding: 0;
    color: #fff;
    background: none; /* No static background, using video */
    overflow-x: hidden;
}

/* Video Background */
.video-background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover; /* Covers full screen */
    z-index: -1; /* Behind everything */
}

/* Content Container */
.content {
    position: relative;
    z-index: 1;
    padding: 20px;
    text-align: center;
}

/* Search Bar */
.search-bar {
    width: 100%;
    max-width: 400px;
    padding: 12px;
    margin: 20px auto;
    display: block;
    border: 2px solid rgba(255, 255, 255, 0.7);
    border-radius: 8px;
    font-size: 1rem;
    background: rgba(0, 0, 0, 0.5);
    color: white;
    outline: none;
}

/* Anime Grid Layout */
.anime-grid {
    display: flex; /* Makes items align horizontally */
    flex-wrap: wrap; /* Wraps to new line if screen is small */
    justify-content: center; /* Centers items */
    gap: 20px; /* Adds spacing between items */
}

.anime-card {
    width: 500px; /* Adjust width for horizontal layout */
    height: 220px; /* Reduce height to make it more rectangular */
    background: rgba(0, 0, 0, 0.6); /* Semi-transparent dark background */
    border-radius: 10px;
    padding: 10px;
    display: flex; /* Aligns image and text in a row */
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.anime-card img {
    width: 120px; /* Smaller image */
    height: 100%;
    object-fit: cover;
    border-radius: 10px 10px 10px 10px; /* Rounded corners on the left */
}

.anime-card .info {
    flex: 1; /* Expands text to fill space */
    padding: 10px;
    color: white;
}

.anime-card:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 15px rgba(255, 255, 255, 0.3);
}

.anime-thumbnail {
            width: 100%;
            height: fit-content;
            object-fit: cover;
        }

    .anime-info {
    flex: 1; /* Expands text to fill space */
    padding: 10px;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}


.anime-title {
    font-weight: bold;
    font-size: 1.3rem;
    color: #fff;
    text-shadow: 2px 2px 10px rgba(255, 255, 255, 0.8);
}

.anime-season {
    color: #ffcccb;
    font-size: 1rem;
    margin-bottom: 5px;
}

.anime-status {
    font-size: 1rem;
    font-weight: bold;
    color: #32cd32;
    text-shadow: 1px 1px 10px rgba(50, 205, 50, 0.8);
}

/* Buttons */
.anime-actions {
    display: flex;
    justify-content: center; /* Center buttons horizontally */
    gap: 10px; /* Adds spacing between buttons */
    margin-top: 10px;
}

/* Individual Buttons */
.view-button, .delete-button, .mark-watched-button {
    padding: 8px 14px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 1rem;
    text-align: center;
    transition: background 0.3s ease, box-shadow 0.3s ease;
    width: auto; /* Ensures all buttons adjust to content */
}

.view-button {
    background: rgb(28 42 48);
    color: white;
}

.view-button:hover {
    background: rgba(0, 162, 255, 1);
    box-shadow: 0 0 10px rgba(0, 162, 255, 0.8);
}

.mark-watched-button {
    background: rgb(28 42 48);
    color: white;
}

.mark-watched-button:hover {
    background: rgba(46, 204, 113, 1);
    box-shadow: 0 0 10px rgba(46, 204, 113, 0.8);
}

.delete-button {
    background: rgb(148 51 41 / 78%);
    color: white;
}

.delete-button:hover {
    background: rgba(231, 76, 60, 1);
    box-shadow: 0 0 10px rgba(231, 76, 60, 0.8);
}
    </style>

    <script>
        // Function to fetch anime data from the server
        async function fetchAnimeData() {
            try {
                const response = await fetch('/api/anime');
                if (!response.ok) {
                    throw new Error('Failed to fetch anime data');
                }
                return await response.json();
            } catch (error) {
                console.error('Error fetching anime data:', error);
                return [];
            }
        }

        function renderAnimeList(animeData) {
    const animeGrid = document.getElementById('anime-grid');
    animeGrid.innerHTML = ''; // Clear existing content

    animeData.forEach(anime => {
        const animeCard = document.createElement('div');
        animeCard.className = 'anime-card';
        animeCard.id = `anime-${anime.id}`;
        animeCard.setAttribute("data-title", anime.title.toLowerCase());

        const animeThumbnail = document.createElement('img');
        animeThumbnail.className = 'anime-thumbnail';
        animeThumbnail.src = anime.thumbnail_url || 'https://via.placeholder.com/250x180?text=No+Image';
        animeThumbnail.alt = anime.title;

        const animeInfo = document.createElement('div');
        animeInfo.className = 'anime-info';

        const animeTitle = document.createElement('div');
        animeTitle.className = 'anime-title';
        animeTitle.textContent = anime.title;

        const animeSeason = document.createElement('div');
        animeSeason.className = 'anime-season';
        animeSeason.textContent = `Season: ${anime.season}`;

        const animeStatus = document.createElement('div');
        animeStatus.className = 'anime-status';
        animeStatus.textContent = anime.status;

        // Actions container
        const animeActions = document.createElement('div');
        animeActions.className = 'anime-actions';
        
        // "Mark as Watched" button
        const markWatchedButton = document.createElement('button');
        markWatchedButton.className = 'mark-watched-button';
        markWatchedButton.textContent = anime.watched ? "Watched ✅" : "Mark as Watched";
        markWatchedButton.onclick = async () => {
            await toggleAnimeWatched(anime.id, markWatchedButton);
        };

        const viewButton = document.createElement('a');
        viewButton.className = 'view-button';
        viewButton.href = `/anime/${anime.id}`;
        viewButton.textContent = 'View Anime';

        const deleteButton = document.createElement('button');
        deleteButton.className = 'delete-button';
        deleteButton.textContent = 'Delete';
        deleteButton.onclick = () => deleteAnime(anime.id);

        // Append buttons to actions container
        animeActions.appendChild(viewButton);
        animeActions.appendChild(markWatchedButton);
        animeActions.appendChild(deleteButton);

        // Append elements to anime info section
        animeInfo.appendChild(animeTitle);
        animeInfo.appendChild(animeSeason);
        animeInfo.appendChild(animeStatus);
        animeInfo.appendChild(animeActions); // ✅ Buttons go inside anime-info

        // Append all elements to anime card
        animeCard.appendChild(animeThumbnail);
        animeCard.appendChild(animeInfo);

        // Append anime card to grid
        animeGrid.appendChild(animeCard);
    });
}

// Function to toggle watched status for an anime
async function toggleAnimeWatched(animeId, button) {
    const response = await fetch(`/mark_anime_watched/${animeId}`, {
        method: 'POST',
    });

    if (response.ok) {
        const data = await response.json();
        if (data.status === "success") {
            button.textContent = button.textContent === "Mark as Watched" ? "Watched ✅" : "Mark as Watched";
        }
    }
}
        // Function to filter anime based on search query
        function filterAnime() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const animeCards = document.querySelectorAll('.anime-card');

            animeCards.forEach(card => {
                const title = card.getAttribute("data-title");
                if (title.includes(query)) {
                    card.style.display = "flex";
                } else {
                    card.style.display = "none";
                }
            });
        }

        // Function to delete an anime
        async function deleteAnime(animeId) {
            if (confirm("Are you sure you want to delete this anime?")) {
                try {
                    const response = await fetch(`/delete_anime/${animeId}`, {
                        method: 'DELETE',
                    });

                    if (response.ok) {
                        // Remove the anime card from the grid
                        document.getElementById(`anime-${animeId}`).remove();
                        alert("Anime deleted successfully.");
                    } else {
                        alert("Failed to delete anime.");
                    }
                } catch (error) {
                    console.error("Error deleting anime:", error);
                    alert("An error occurred while deleting the anime.");
                }
            }
        }

        // Load and render anime data when the page loads
        document.addEventListener('DOMContentLoaded', async () => {
            const animeData = await fetchAnimeData();
            renderAnimeList(animeData);
        });
    </script>
{% endblock %}
